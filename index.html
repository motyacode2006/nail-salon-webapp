<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoNails - Запись на маникюр</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --color-1: #24060a;
            --color-2: #5f1227;
            --color-3: #753547;
            --color-4: #a4848f;
            --color-5: #fdcbe4;
            --main-bg: #fdcbe4;
            --header-bg: linear-gradient(135deg, #5f1227 0%, #753547 100%);
            --header-title-text: #fdcbe4;
            --hero-title-color: #24060a;
            --hero-desc-color: #5f1227;
            --primary-button-bg: #24060a;
            --primary-button-text: #fdcbe4;
            --feature-card-border: rgba(117,53,71,0.4);
            --feature-title-color: #24060a;
            --feature-desc-color: #5f1227;
            --shadow: 0 10px 40px rgba(94,18,39,0.3);
            --shadow-sm: 0 4px 16px rgba(94,18,39,0.2);
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.5;
            color: var(--hero-desc-color);
            background: var(--main-bg);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        .app { max-width: 500px; margin: 0 auto; min-height: 100vh; }

        /* Header */
        .header { position: relative; background: var(--header-bg); }
        .header-logo { width: 100%; height: 180px; overflow: hidden; }
        .header-logo img { width: 100%; height: 180px; object-fit: cover; }
        .header-content { position: relative; padding: 20px; text-align: center; background: var(--header-bg); }
        .header-title { font-family: var(--font-heading); font-size: 1.6rem; font-weight: 600; color: var(--header-title-text); margin-bottom: 4px; }
        .header-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(253,203,228,0.2); border-radius: 50px; font-size: 0.85rem; color: var(--header-title-text); font-weight: 500; }

        /* Tabs */
        .tabs { display: flex; background: white; border-bottom: 2px solid var(--feature-card-border); position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 14px; text-align: center; font-weight: 500; color: var(--feature-desc-color); background: transparent; border: none; cursor: pointer; transition: all 0.3s ease; font-size: 0.95rem; }
        .tab.active { color: var(--color-2); border-bottom: 3px solid var(--color-2); background: rgba(95,18,39,0.05); }
        .tab:hover { background: rgba(95,18,39,0.05); }

        /* Main */
        .main { padding: 20px 16px; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-family: var(--font-heading); font-size: 1.3rem; font-weight: 600; color: var(--hero-title-color); margin-bottom: 16px; }

        /* Services */
        .services-grid { display: flex; flex-direction: column; gap: 12px; }
        .service-card { background: white; border: 2px solid var(--feature-card-border); border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.3s ease; position: relative; }
        .service-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); border-color: var(--color-2); }
        .service-card.selected { border-color: var(--color-2); background: rgba(95,18,39,0.05); box-shadow: var(--shadow-sm); }
        .service-card.selected::after { content: '✓'; position: absolute; top: 12px; right: 12px; width: 24px; height: 24px; background: var(--color-2); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .service-header { display: flex; align-items: flex-start; gap: 12px; }
        .service-info { flex: 1; }
        .service-name { font-weight: 600; color: var(--feature-title-color); font-size: 1rem; margin-bottom: 4px; }
        .service-desc { font-size: 0.85rem; color: var(--feature-desc-color); }
        .service-price { font-weight: 700; color: var(--color-2); font-size: 1.1rem; margin-top: 8px; }
        .service-duration { font-size: 0.8rem; color: var(--feature-desc-color); margin-top: 4px; }

        /* Sub-services */
        .sub-services { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--feature-card-border); }
        .sub-services.visible { display: block; animation: fadeIn 0.3s ease; }
        .sub-service-option { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; margin: 6px 0; background: rgba(95,18,39,0.03); border-radius: 10px; cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; }
        .sub-service-option:hover { background: rgba(95,18,39,0.08); }
        .sub-service-option.selected { border-color: var(--color-2); background: rgba(95,18,39,0.1); }
        .sub-service-name { font-size: 0.9rem; color: var(--feature-title-color); }
        .sub-service-price { font-weight: 600; color: var(--color-2); }

        /* Photo Notice */
        .photo-notice { display: none; margin-top: 12px; padding: 12px; background: rgba(253,203,228,0.3); border-radius: 12px; border: 1px dashed var(--color-3); }
        .photo-notice.visible { display: flex; align-items: center; gap: 10px; animation: fadeIn 0.3s ease; }
        .photo-notice-icon { font-size: 1.5rem; }
        .photo-notice-text { font-size: 0.9rem; color: var(--color-2); }

        /* Date & Time */
        .datetime-section { margin-top: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 600; color: var(--feature-title-color); margin-bottom: 10px; font-size: 0.95rem; }
        .date-input { width: 100%; padding: 14px 16px; font-family: var(--font-body); font-size: 1rem; color: var(--feature-title-color); background: white; border: 2px solid var(--feature-card-border); border-radius: 12px; outline: none; transition: all 0.3s ease; cursor: pointer; }
        .date-input:focus { border-color: var(--color-2); box-shadow: 0 0 0 4px rgba(95,18,39,0.1); }
        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .time-slot { padding: 12px 8px; text-align: center; background: white; border: 2px solid var(--feature-card-border); border-radius: 10px; cursor: pointer; transition: all 0.3s ease; font-weight: 500; font-size: 0.9rem; color: var(--feature-title-color); }
        .time-slot:hover { border-color: var(--color-2); background: rgba(95,18,39,0.03); }
        .time-slot.selected { background: var(--primary-button-bg); border-color: var(--primary-button-bg); color: var(--primary-button-text); }

        /* Appointments */
        .appointments-list { display: flex; flex-direction: column; gap: 12px; }
        .appointment-card { background: white; border: 2px solid var(--feature-card-border); border-radius: 16px; padding: 16px; position: relative; }
        .appointment-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .appointment-service { font-weight: 600; color: var(--feature-title-color); font-size: 1rem; }
        .appointment-price { font-weight: 700; color: var(--color-2); }
        .appointment-details { font-size: 0.9rem; color: var(--feature-desc-color); }
        .appointment-details p { margin: 4px 0; }
        .cancel-btn { margin-top: 12px; padding: 10px 16px; background: transparent; border: 2px solid #e74c3c; color: #e74c3c; border-radius: 10px; cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: all 0.3s ease; width: 100%; }
        .cancel-btn:hover { background: #e74c3c; color: white; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--feature-desc-color); }
        .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state-text { font-size: 1rem; }

        /* Footer */
        .footer { margin-top: 32px; padding: 20px; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
        .footer-title { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 600; color: var(--hero-title-color); margin-bottom: 16px; text-align: center; }
        .contact-item { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px; background: rgba(253,203,228,0.2); border-radius: 12px; text-decoration: none; color: var(--hero-desc-color); transition: all 0.3s ease; }
        .contact-item:hover { background: rgba(253,203,228,0.4); transform: translateX(4px); }
        .contact-icon { font-size: 1.3rem; }
        .contact-text { flex: 1; font-size: 0.95rem; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(36,6,10,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: white; border-radius: 24px; padding: 28px; max-width: 340px; width: 90%; text-align: center; transform: scale(0.9); transition: transform 0.3s ease; }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-icon { font-size: 3.5rem; margin-bottom: 16px; }
        .modal-title { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 600; color: var(--hero-title-color); margin-bottom: 12px; }
        .modal-text { color: var(--hero-desc-color); margin-bottom: 20px; font-size: 0.95rem; line-height: 1.6; }
        .modal-btn { width: 100%; padding: 14px; font-family: var(--font-body); font-size: 1rem; font-weight: 600; color: var(--primary-button-text); background: var(--primary-button-bg); border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; margin-bottom: 10px; }
        .modal-btn:hover { opacity: 0.9; }
        .modal-btn-secondary { background: transparent; color: var(--color-2); border: 2px solid var(--color-2); }
        .modal-btn-secondary:hover { background: rgba(95,18,39,0.05); }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1001; }

        @media (max-width: 360px) { .time-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    
    <div class="app">
        <header class="header">
            <div class="header-logo">
                <img src="GoNailsPinky.png" alt="GoNails" onerror="this.style.display='none'">
            </div>
            <div class="header-content">
                <h1 class="header-title">Запись на маникюр 💅</h1>
                <div class="header-badge">✨ Премиум сервис</div>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="booking">💅 Записаться</button>
            <button class="tab" data-tab="appointments">📋 Мои записи</button>
        </nav>

        <main class="main">
            <div class="tab-content active" id="booking-tab">
                <section class="services-section">
                    <h2 class="section-title">Выберите услугу</h2>
                    <div class="services-grid" id="services-grid"></div>
                </section>

                <section class="datetime-section">
                    <h2 class="section-title">Дата и время</h2>
                    <div class="form-group">
                        <label class="form-label">📅 Выберите дату</label>
                        <input type="date" class="date-input" id="date-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">⏰ Выберите время</label>
                        <div class="time-grid" id="time-grid"></div>
                    </div>
                </section>

                <footer class="footer">
                    <h3 class="footer-title">📞 Контакты</h3>
                    <a href="https://maps.google.com/?q=Гаврилова+8А" target="_blank" class="contact-item">
                        <span class="contact-icon">📍</span>
                        <span class="contact-text">Гаврилова 8А</span>
                    </a>
                    <a href="https://t.me/shchg3" target="_blank" class="contact-item">
                        <span class="contact-icon">📱</span>
                        <span class="contact-text">Telegram: @shchg3</span>
                    </a>
                    <a href="https://tiktok.com/@gonaiilsskzn" target="_blank" class="contact-item">
                        <span class="contact-icon">🎵</span>
                        <span class="contact-text">TikTok: @gonaiilsskzn</span>
                    </a>
                    <a href="https://instagram.com/gonaiilsskzn" target="_blank" class="contact-item">
                        <span class="contact-icon">📷</span>
                        <span class="contact-text">Instagram: @gonaiilsskzn</span>
                    </a>
                </footer>
            </div>

            <div class="tab-content" id="appointments-tab">
                <div class="appointments-list" id="appointments-list"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="success-modal">
        <div class="modal">
            <div class="modal-icon">💅</div>
            <h3 class="modal-title">Запись создана!</h3>
            <p class="modal-text" id="modal-text"></p>
            <button class="modal-btn" id="modal-close-btn">Отлично!</button>
            <button class="modal-btn modal-btn-secondary" id="send-photo-btn" style="display:none;">📤 Отправить фото дизайна</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const services = [
            { id: 'manicure', name: 'Маникюр (без покрытия)', price: 800, duration: '60 мин', hasSubServices: false },
            { id: 'coating', name: 'Покрытие', desc: 'Снятие + комби + укрепление + гель-лак', price: 1800, duration: '90 мин', hasSubServices: false },
            { id: 'extensions', name: 'Наращивание', price: null, duration: '120-150 мин', hasSubServices: true, subServices: [
                { id: 'extensions_s', name: 'Наращивание S', price: 2500 },
                { id: 'extensions_m', name: 'Наращивание M', price: 2800 },
                { id: 'extensions_xl', name: 'Наращивание XL', price: 3300 }
            ]},
            { id: 'correction', name: 'Коррекция', price: null, duration: '90-120 мин', hasSubServices: true, subServices: [
                { id: 'correction_s', name: 'Коррекция S', price: 2000 },
                { id: 'correction_m', name: 'Коррекция M', price: 2300 },
                { id: 'correction_xl', name: 'Коррекция XL', price: 2700 }
            ]},
            { id: 'design', name: 'Дизайн', price: null, duration: '30-60 мин', hasSubServices: true, needsPhoto: true, subServices: [
                { id: 'design_light', name: 'Дизайн Light', price: 100 },
                { id: 'design_medium', name: 'Дизайн Medium', price: 200 },
                { id: 'design_hard', name: 'Дизайн Hard', price: 300 }
            ]},
            { id: 'claws', name: 'Когти', desc: 'Любая длина + дизайн', price: 3000, duration: '150 мин', hasSubServices: false, needsPhoto: true },
            { id: 'removal_free', name: 'Снятие чужого покрытия', price: 0, duration: '30 мин', hasSubServices: false },
            { id: 'removal_paid', name: 'Снятие чужого наращивания', price: 200, duration: '45 мин', hasSubServices: false }
        ];

        const timeSlots = ['10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30'];

        const state = { selectedService: null, selectedSubService: null, selectedDate: null, selectedTime: null };

        const servicesGrid = document.getElementById('services-grid');
        const timeGrid = document.getElementById('time-grid');
        const dateInput = document.getElementById('date-input');
        const appointmentsList = document.getElementById('appointments-list');
        const successModal = document.getElementById('success-modal');
        const modalText = document.getElementById('modal-text');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const sendPhotoBtn = document.getElementById('send-photo-btn');
        const confettiCanvas = document.getElementById('confetti-canvas');

        function renderServices() {
            servicesGrid.innerHTML = services.map(service => `
                <div class="service-card" data-service-id="${service.id}">
                    <div class="service-header">
                        <div class="service-info">
                            <div class="service-name">${service.name}</div>
                            ${service.desc ? `<div class="service-desc">${service.desc}</div>` : ''}
                            ${service.price !== null ? `<div class="service-price">${service.price} ₽</div>` : ''}
                            ${service.duration ? `<div class="service-duration">⏱ ${service.duration}</div>` : ''}
                        </div>
                    </div>
                    ${service.hasSubServices ? `
                        <div class="sub-services" id="sub-${service.id}">
                            ${service.subServices.map(sub => `
                                <div class="sub-service-option" data-sub-id="${sub.id}" data-sub-price="${sub.price}">
                                    <span class="sub-service-name">${sub.name}</span>
                                    <span class="sub-service-price">${sub.price} ₽</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    ${service.needsPhoto ? `
                        <div class="photo-notice" id="photo-${service.id}">
                            <span class="photo-notice-icon">📸</span>
                            <span class="photo-notice-text">Отправьте фото дизайна в чат с ботом</span>
                        </div>
                    ` : ''}
                </div>
            `).join('');

            document.querySelectorAll('.service-card').forEach(card => {
                card.addEventListener('click', () => selectService(card.dataset.serviceId));
            });

            document.querySelectorAll('.sub-service-option').forEach(option => {
                option.addEventListener('click', (e) => { e.stopPropagation(); selectSubService(option); });
            });
        }

        function selectService(serviceId) {
            const service = services.find(s => s.id === serviceId);
            state.selectedService = service;
            state.selectedSubService = null;

            document.querySelectorAll('.service-card').forEach(card => {
                const isSelected = card.dataset.serviceId === serviceId;
                card.classList.toggle('selected', isSelected);
                const subServices = card.querySelector('.sub-services');
                if (subServices) subServices.classList.toggle('visible', isSelected);
                const photoNotice = card.querySelector('.photo-notice');
                if (photoNotice) photoNotice.classList.toggle('visible', isSelected);
            });

            document.querySelectorAll('.sub-service-option').forEach(opt => opt.classList.remove('selected'));
            updateMainButton();
            if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function selectSubService(option) {
            option.parentElement.querySelectorAll('.sub-service-option').forEach(opt => opt.classList.remove('selected'));
            option.classList.add('selected');
            state.selectedSubService = { id: option.dataset.subId, price: parseInt(option.dataset.subPrice), name: option.querySelector('.sub-service-name').textContent };
            updateMainButton();
            if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function renderTimeSlots() {
            timeGrid.innerHTML = timeSlots.map(time => `<div class="time-slot" data-time="${time}">${time}</div>`).join('');
            document.querySelectorAll('.time-slot').forEach(slot => { slot.addEventListener('click', () => selectTime(slot.dataset.time)); });
        }

        function selectTime(time) {
            state.selectedTime = time;
            document.querySelectorAll('.time-slot').forEach(slot => { slot.classList.toggle('selected', slot.dataset.time === time); });
            updateMainButton();
            if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function handleDateChange(e) { state.selectedDate = e.target.value; updateMainButton(); if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged(); }

        function setMinDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            dateInput.min = `${year}-${month}-${day}`;
            dateInput.value = `${year}-${month}-${day}`;
            state.selectedDate = dateInput.value;
        }

        function updateMainButton() {
            const price = state.selectedSubService?.price ?? state.selectedService?.price;
            const isValid = state.selectedService && state.selectedDate && state.selectedTime && (state.selectedService.price !== null || state.selectedSubService);
            if (tg?.MainButton) {
                if (isValid && price !== null) { tg.MainButton.setText(`💅 Записаться — ${price} ₽`); tg.MainButton.show(); tg.MainButton.enable(); }
                else tg.MainButton.hide();
            }
        }

        function submitBooking() {
            if (!state.selectedService || !state.selectedDate || !state.selectedTime) return;
            const price = state.selectedSubService?.price ?? state.selectedService.price;
            const serviceName = state.selectedSubService?.name ?? state.selectedService.name;
            const needsPhoto = state.selectedService.needsPhoto;

            const appointment = { id: Date.now(), service: serviceName, serviceId: state.selectedService.id, subServiceId: state.selectedSubService?.id, price: price, date: state.selectedDate, time: state.selectedTime, needsPhoto: needsPhoto, createdAt: new Date().toISOString() };
            saveAppointment(appointment);

            if (tg) { tg.sendData(JSON.stringify({ service: serviceName, serviceId: state.selectedService.id, subServiceId: state.selectedSubService?.id, price: price, date: state.selectedDate, time: state.selectedTime })); }
            showSuccessModal(appointment);
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function showSuccessModal(appointment) {
            const dateObj = new Date(appointment.date);
            const dateFormatted = dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'short' });
            modalText.innerHTML = `<strong>${appointment.service}</strong><br>📅 ${dateFormatted}<br>⏰ ${appointment.time}<br>💰 ${appointment.price} ₽`;
            sendPhotoBtn.style.display = appointment.needsPhoto ? 'block' : 'none';
            successModal.classList.add('active');
            launchConfetti();
        }

        function closeModal() {
            successModal.classList.remove('active');
            state.selectedService = null; state.selectedSubService = null; state.selectedTime = null;
            document.querySelectorAll('.service-card').forEach(card => { card.classList.remove('selected'); const subServices = card.querySelector('.sub-services'); if (subServices) subServices.classList.remove('visible'); const photoNotice = card.querySelector('.photo-notice'); if (photoNotice) photoNotice.classList.remove('visible'); });
            document.querySelectorAll('.time-slot').forEach(slot => slot.classList.remove('selected'));
            updateMainButton();
            renderAppointments();
        }

        function saveAppointment(appointment) { const appointments = getAppointments(); appointments.push(appointment); localStorage.setItem('gonails_appointments', JSON.stringify(appointments)); }
        function getAppointments() { const data = localStorage.getItem('gonails_appointments'); return data ? JSON.parse(data) : []; }

        function cancelAppointment(id) {
            let appointments = getAppointments();
            appointments = appointments.filter(a => a.id !== id);
            localStorage.setItem('gonails_appointments', JSON.stringify(appointments));
            renderAppointments();
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
        }

        function renderAppointments() {
            const appointments = getAppointments();
            const now = new Date();
            const futureAppointments = appointments.filter(a => { const appointmentDate = new Date(a.date + 'T' + a.time); return appointmentDate > now; });

            if (futureAppointments.length === 0) {
                appointmentsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">У вас пока нет записей</div></div>';
                return;
            }

            futureAppointments.sort((a, b) => { const dateA = new Date(a.date + 'T' + a.time); const dateB = new Date(b.date + 'T' + b.time); return dateA - dateB; });

            appointmentsList.innerHTML = futureAppointments.map(apt => {
                const dateObj = new Date(apt.date);
                const dateFormatted = dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'short' });
                return `<div class="appointment-card"><div class="appointment-header"><div class="appointment-service">${apt.service}</div><div class="appointment-price">${apt.price} ₽</div></div><div class="appointment-details"><p>📅 ${dateFormatted}</p><p>⏰ ${apt.time}</p>${apt.needsPhoto ? '<p>📸 Не забудьте отправить фото дизайна</p>' : ''}</div><button class="cancel-btn" onclick="cancelAppointment(${apt.id})">❌ Отменить запись</button></div>`;
            }).join('');
        }

        function initTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                    document.getElementById(`${tabId}-tab`).classList.add('active');
                    if (tabId === 'appointments') renderAppointments();
                    if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
                });
            });
        }

        function launchConfetti() {
            const ctx = confettiCanvas.getContext('2d');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            const particles = [];
            const colors = ['#24060a', '#5f1227', '#753547', '#a4848f', '#fdcbe4'];
            for (let i = 0; i < 100; i++) { particles.push({ x: Math.random() * confettiCanvas.width, y: Math.random() * confettiCanvas.height - confettiCanvas.height, size: Math.random() * 8 + 4, speedY: Math.random() * 3 + 2, speedX: Math.random() * 2 - 1, color: colors[Math.floor(Math.random() * colors.length)], rotation: Math.random() * 360 }); }
            let frame = 0;
            const maxFrames = 150;
            function animate() {
                ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                particles.forEach(p => { ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180); ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size); ctx.restore(); p.y += p.speedY; p.x += p.speedX; p.rotation += 2; });
                frame++;
                if (frame < maxFrames) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
            animate();
        }

        function init() {
            renderServices();
            renderTimeSlots();
            setMinDate();
            initTabs();
            renderAppointments();
            dateInput.addEventListener('change', handleDateChange);
            modalCloseBtn.addEventListener('click', closeModal);
            sendPhotoBtn.addEventListener('click', () => { if (tg) tg.openTelegramLink('https://t.me/shchg3'); else window.open('https://t.me/shchg3', '_blank'); closeModal(); });
            if (tg?.MainButton) { tg.MainButton.setParams({ color: '#24060a', text_color: '#fdcbe4' }); tg.MainButton.onClick(submitBooking); }
        }

        init();
    </script>
</body>
</html>
